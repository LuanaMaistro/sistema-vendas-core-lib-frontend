name: Create Release

on:
  push:
    tags:
      - 'v*'  # Dispara para tags que começam com 'v' (ex: v1.0.0, v2.1.3)

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Necessário para criar releases

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.TESTE }}

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true  # Gera notes automaticamente baseado nos commits
          draft: false
          prerelease: false
